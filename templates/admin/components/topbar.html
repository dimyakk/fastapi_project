
{% block content %}

<!-- Top bar -->
<header class="sticky top-0 z-30 flex h-16 items-center justify-between border-b border-gray-200 bg-white px-7">
    <span class="text-base font-bold text-gray-900"> {{ title }}</span>
    <div class="flex items-center gap-3">
    <span class="text-[0.8rem] text-gray-500">{{ now().strftime('%d %b %Y') }}</span>
    <a href="{{ url_for('home') }}" class="flex items-center gap-1.5 rounded border border-primary px-3 py-1.5 text-[0.8rem] font-semibold text-primary transition hover:bg-primary hover:text-white">
        <svg class="size-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
        </svg>
        Ver tienda
    </a>
    </div>
</header>

{% endblock content %}
