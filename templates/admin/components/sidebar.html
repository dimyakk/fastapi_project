
{% block content %}
<!-- ══════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════════ -->
  <aside class="fixed top-0 left-0 z-40 flex h-screen w-60 flex-col bg-primary">

    <!-- Brand -->
    <div class="flex h-16 items-center gap-2.5 border-b border-white/15 px-5">
      <img src="{{ url_for('static', path='logo/logo_v3.png') }}" alt="Naná Essência Logo" class="h-8 w-auto" onerror="this.style.display='none'">
      <span class="text-[0.7rem] font-bold uppercase tracking-widest text-white/70">Admin Panel</span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-4">

      <p class="px-5 pb-1.5 pt-4 text-[0.65rem] font-bold uppercase tracking-widest text-white/40">General</p>

      <ul>
        <li>
          <a href="{{ url_for('dashboard')}}" class="flex items-center gap-2.5 border-l-[3px] border-white bg-white/15 px-5 py-2.5 text-sm font-semibold text-white">
            <svg class="size-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Dashboard
          </a>
        </li>
      </ul>

      <p class="px-5 pb-1.5 pt-4 text-[0.65rem] font-bold uppercase tracking-widest text-white/40">Catálogo</p>

      <ul>
        <li>
          <a href="{{ url_for ('candles')}}" class="flex items-center gap-2.5 border-l-[3px] border-transparent px-5 py-2.5 text-sm text-white/80 transition hover:bg-white/10 hover:text-white">
            <svg class="size-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z" />
            </svg>
            Velas
          </a>
        </li>
      </ul>

      <p class="px-5 pb-1.5 pt-4 text-[0.65rem] font-bold uppercase tracking-widest text-white/40">Usuarios</p>

      <ul>
        <li>
          <a href="{{ url_for ('users')}}" class="flex items-center gap-2.5 border-l-[3px] border-transparent px-5 py-2.5 text-sm text-white/80 transition hover:bg-white/10 hover:text-white">
            <svg class="size-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            Usuarios
          </a>
        </li>
      </ul>

      <p class="px-5 pb-1.5 pt-4 text-[0.65rem] font-bold uppercase tracking-widest text-white/40">Sistema</p>

      <ul>
        <li>
          <a href="{{ url_for ('config') }}" class="flex items-center gap-2.5 border-l-[3px] border-transparent px-5 py-2.5 text-sm text-white/80 transition hover:bg-white/10 hover:text-white">
            <svg class="size-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            Configuración
          </a>
        </li>
      </ul>

    </nav>

    <!-- User info -->
    <div class="border-t border-white/15 px-5 py-4">
      <div class="flex items-center gap-2.5">
        <div class="flex size-8 shrink-0 items-center justify-content center rounded-full bg-white/20 text-xs font-bold text-white">
          A
        </div>
        <div class="min-w-0 flex-1">
          <p class="truncate text-[0.8rem] font-semibold text-white">Admin</p>
          <p class="text-[0.7rem] text-white/55">Administrador</p>
        </div>
        <button class="text-white/60 transition hover:text-white" title="Cerrar sesión">
          <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>

  </aside>

{% endblock content %}
