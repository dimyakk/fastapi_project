<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
        {% if title %}
            {{ title }} · Naná Essência Admin
        {% else %}
            Naná Essência Admin
        {% endif %}
    </title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
</head>
<body class="flex min-h-screen bg-gray-50 text-gray-900">

    {% include 'components/sidebar.html'%}     
    
    <!-- ══════════════════════════════════════
       MAIN
    ══════════════════════════════════════════ -->

    <div class="ml-60 flex flex-1 flex-col">

        {% include 'components/topbar.html'%}

        <!-- Page content -->
        <main class="flex flex-1 flex-col gap-7 p-7">

            {% block content %}
            {% endblock content %}

        </main>

    </div><!-- /main -->

    <dialog
        id="deleteModal"
        closedby="any"
        aria-labelledby="modalTitle"
        aria-describedby="modalDescription"
        class="m-auto max-w-xl rounded-lg bg-white p-6 shadow-lg backdrop:bg-black/50 dark:bg-gray-900 dark:backdrop:bg-white/50"
        >
        <div class="flex flex-col gap-4">
            <h2 id="modalTitle" class="text-xl font-bold text-gray-900 sm:text-2xl dark:text-white">
            Excluir Vela ❌
            </h2>

            <p id="modalDescription" class="text-pretty text-gray-700 dark:text-gray-200">
            Confirma que deseja excluir esta vela?
            <br>
            <br>
            <strong><em>Esta ação não pode ser desfeita.</em></strong>
            </p>

            <div class="flex justify-end gap-2">
            <button
                type="button"
                data-modal-close
                class="rounded bg-red-100 px-4 py-2 text-sm font-medium text-red-700 transition-colors hover:bg-red-200 focus:ring-2 focus:ring-red-600 focus:ring-offset-2 focus:ring-offset-white focus:outline-none dark:bg-red-800 dark:text-red-200 dark:hover:bg-red-700 dark:focus:ring-red-300 dark:focus:ring-offset-gray-900"
            >
                Cancelar
            </button>

            <button
                type="button"
                data-confirm-delete
                class="rounded bg-red-600 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-red-700 focus:ring-2 focus:ring-red-600 focus:ring-offset-2 focus:ring-offset-white focus:outline-none dark:bg-red-300 dark:text-white dark:hover:bg-red-200 dark:focus:ring-red-300 dark:focus:ring-offset-gray-900"
            >
                Excluir
            </button>
            </div>
        </div>
    </dialog>

    <script
        type="module"
        src="{{ url_for('static', path='js/main.js') }}">
    </script>
    
</body>
</html>
